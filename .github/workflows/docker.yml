name: Build and push OpenSplat CUDA image

on:
  workflow_dispatch:        # trigger manually from GitHub Actions UI
  push:
    paths:
      - Dockerfile          # auto-rebuild when Dockerfile changes
    branches:
      - feature/cloud-gpu
      - main

jobs:
  build:
    runs-on: ubuntu-latest  # real amd64 Linux — no QEMU emulation needed

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: kurkista/opensplat-cuda:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
