# Gaussian Splat pipeline configuration
# Edit these defaults; override any value per-run with CLI flags.

[ffmpeg]
fps     = 2      # frames/sec extracted from video; 1 for slow drone, 3 for fast handheld
quality = 1      # JPEG qscale (1 = best quality / largest file)

[colmap]
# 'sequential'  — ordered frames from a single video pass (fastest; single mission)
# 'vocab_tree'  — multi-mission or unordered sets; matches by visual similarity (recommended for drone)
# 'exhaustive'  — small unordered sets (<300 images); correct but O(n²)
matcher       = "sequential"
single_camera = true   # true if all images share one lens (drone, single camera); false for mixed sets

[opensplat]
iterations  = 7000      # 3000 quick preview, 7000 standard, 30000 maximum quality
output_name = "splat.ply"
sh_degree         = 3    # full colour; safe on Metal GPU
num_downscales    = 2    # progressive resolution: starts 1/4 res, doubles at step 3000 & 6000
reset_alpha_every = 30   # standard value now that Metal is stable

[cloud]
# GPU cloud training — activated with: python3 splat.py <input> --cloud runpod
# Requires: export RUNPOD_API_KEY=your_key_here  (get at runpod.io/console/user/settings)
iterations = 30000                           # 30k is practical with GPU (~20 min)
gpu        = "NVIDIA GeForce RTX 4090"       # ~$0.50/hr on RunPod
image      = "kurkista/opensplat-cuda:latest" # pre-built Docker image with CUDA + OpenSplat
