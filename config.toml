# Gaussian Splat pipeline configuration
# Edit these defaults; override any value per-run with CLI flags.

[ffmpeg]
fps     = 2      # frames/sec extracted from video; 1 for slow drone, 3 for fast handheld
quality = 1      # JPEG qscale (1 = best quality / largest file)

[colmap]
# 'sequential' — ordered frames from a single video pass (much faster, preferred for drone)
# 'exhaustive' — unordered photo sets (cemetery walk-around, hand-held survey)
matcher       = "sequential"
single_camera = true   # true if all images share one lens (drone, single camera); false for mixed sets

[opensplat]
iterations  = 7000      # 3000 quick preview, 7000 standard, 30000 maximum quality
output_name = "splat.ply"
# SH degree 3 = full colour (default) but causes NaN on CPU at high iteration counts.
# Degree 1 is stable on CPU and still produces good colour; raise to 3 once Metal works.
sh_degree   = 1
# CPU NaN prevention: two scheduled events at ~step 3000 combine to cause divergence:
#   1. Opacity reset (reset_alpha_every=30 × refine_every=100 → fires at step 3400)
#   2. Resolution schedule jump (num_downscales=2 → doubles at step 3000)
# Setting both past our iteration count keeps training numerically stable.
num_downscales    = 0    # train at full resolution from start (no mid-run jump)
reset_alpha_every = 300  # 300×100=30000 steps — effectively disabled for ≤30k runs
